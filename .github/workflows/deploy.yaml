name: Deploy

on:
  push:
    branches:
      - main

env:
  DOCKERHUB_USER: tugy

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      market_data_image: ${{ steps.meta-market-data.outputs.tags && fromJSON(steps.meta-market-data.outputs.json).tags[0] }}
      portfolio_image: ${{ fromJSON(steps.meta-portfolio.outputs.json).tags[0] }}
      risk_image: ${{ fromJSON(steps.meta-risk.outputs.json).tags[0] }}
      nginx_image: ${{ fromJSON(steps.meta-nginx.outputs.json).tags[0] }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Meta — market-data
        id: meta-market-data
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USER }}/adifinki-market-data
          tags: type=sha,priority=610

      - name: Meta — portfolio
        id: meta-portfolio
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USER }}/adifinki-portfolio
          tags: type=sha,priority=610

      - name: Meta — risk
        id: meta-risk
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USER }}/adifinki-risk
          tags: type=sha,priority=610

      - name: Meta — nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USER }}/adifinki-nginx
          tags: type=sha,priority=610

      - name: Build and push — market-data
        uses: docker/build-push-action@v6
        with:
          context: services/market-data
          push: true
          tags: ${{ steps.meta-market-data.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-market-data:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-market-data:buildcache,mode=max

      - name: Build and push — portfolio
        uses: docker/build-push-action@v6
        with:
          context: services/portfolio
          push: true
          tags: ${{ steps.meta-portfolio.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-portfolio:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-portfolio:buildcache,mode=max

      - name: Build and push — risk
        uses: docker/build-push-action@v6
        with:
          context: services/risk
          push: true
          tags: ${{ steps.meta-risk.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-risk:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-risk:buildcache,mode=max

      - name: Build and push — nginx
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-nginx:buildcache
          cache-to: type=registry,ref=${{ env.DOCKERHUB_USER }}/adifinki-nginx:buildcache,mode=max

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: IamTugy
          repositories: server

      - name: Trigger deploy
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh workflow run -R IamTugy/server deploy-adifinki.yaml \
            -f "market_data_image=${{ fromJSON(steps.meta-market-data.outputs.json).tags[0] }}" \
            -f "portfolio_image=${{ fromJSON(steps.meta-portfolio.outputs.json).tags[0] }}" \
            -f "risk_image=${{ fromJSON(steps.meta-risk.outputs.json).tags[0] }}" \
            -f "nginx_image=${{ fromJSON(steps.meta-nginx.outputs.json).tags[0] }}"
