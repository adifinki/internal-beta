events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Upstreams ───────────────────────────────────────────────────────────────
    upstream market_data {
        server market-data:8001;
    }

    upstream portfolio {
        server portfolio:8002;
    }

    upstream risk {
        server risk:8003;
    }

    # ── Server ──────────────────────────────────────────────────────────────────
    server {
        listen 80;

        # market-data-service SSE (screener progress) — disable buffering
        location /api/market-data/screener/ {
            rewrite ^/api/market-data/(.*) /$1 break;
            proxy_pass http://market_data;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # market-data-service  →  /api/market-data/*
        location /api/market-data/ {
            rewrite ^/api/market-data/(.*) /$1 break;
            proxy_pass http://market_data;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # portfolio-service  →  /api/portfolio/* → /portfolio/*
        location /api/portfolio/ {
            rewrite ^/api/portfolio/(.*) /portfolio/$1 break;
            proxy_pass http://portfolio;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # risk-service  →  /api/risk/* → /risk/*
        location /api/risk/ {
            rewrite ^/api/risk/(.*) /risk/$1 break;
            proxy_pass http://risk;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # React frontend (added in Phase 4)
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
